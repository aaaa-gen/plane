services:
  web:
    image: ghcr.io/aaaa-gen/plane-frontend:${APP_RELEASE:-internal-preview}
    restart: always
    depends_on:
      - api

  admin:
    image: ghcr.io/aaaa-gen/plane-admin:${APP_RELEASE:-internal-preview}
    restart: always
    depends_on:
      - api
      - web

  space:
    image: ghcr.io/aaaa-gen/plane-space:${APP_RELEASE:-internal-preview}
    restart: always
    depends_on:
      - api
      - web

  api:
    image: ghcr.io/aaaa-gen/plane-backend:${APP_RELEASE:-internal-preview}
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    env_file:
      - ./plane.env
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq

  worker:
    image: ghcr.io/aaaa-gen/plane-backend:${APP_RELEASE:-internal-preview}
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - ./plane.env
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq

  beat-worker:
    image: ghcr.io/aaaa-gen/plane-backend:${APP_RELEASE:-internal-preview}
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - ./plane.env
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq

  migrator:
    image: ghcr.io/aaaa-gen/plane-backend:${APP_RELEASE:-internal-preview}
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    env_file:
      - ./plane.env
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq

  live:
    image: ghcr.io/aaaa-gen/plane-live:${APP_RELEASE:-internal-preview}
    restart: always

  plane-db:
    image: postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - ./plane.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: always
    volumes:
      - redisdata:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: always
    env_file:
      - ./plane.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  plane-minio:
    image: minio/minio:latest
    restart: always
    command: server /export --console-address ":9090"
    volumes:
      - uploads:/export
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}

  proxy:
    image: ghcr.io/aaaa-gen/plane-proxy:${APP_RELEASE:-internal-preview}
    restart: always
    ports:
      - ${LISTEN_HTTP_PORT}:80
      - ${LISTEN_HTTPS_PORT}:443
    environment:
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
    depends_on:
      - web
      - api
      - space
      - admin

volumes:
  pgdata:
  redisdata:
  uploads:
  rabbitmq_data:
