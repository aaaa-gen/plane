# Plane.so Docker Compose - Compatible with Traefik Gateway
# Requires: docker network create traefik (if not exists)

x-app-env: &app-env
  WEB_URL: https://${APP_DOMAIN}
  DEBUG: ${DEBUG}
  CORS_ALLOWED_ORIGINS: https://${APP_DOMAIN}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS}
  USE_MINIO: 1
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@plane-db:5432/${POSTGRES_DB}
  SECRET_KEY: ${SECRET_KEY}
  AMQP_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@plane-mq:5672/${RABBITMQ_VHOST}
  API_KEY_RATE_LIMIT: ${API_KEY_RATE_LIMIT}
  MINIO_ENDPOINT_SSL: 0
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}
  # Reverse Proxy Configuration (CRITICAL for CSRF and URL generation)
  DOMAIN_NAME: ${APP_DOMAIN}
  SITE_ADDRESS: https://${APP_DOMAIN}
  TRUSTED_PROXIES: "0.0.0.0/0"
  LISTEN_HTTP_PORT: "8000"
  # Database
  PGHOST: plane-db
  PGDATABASE: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_PORT: 5432
  # Redis
  REDIS_HOST: plane-redis
  REDIS_PORT: 6379
  REDIS_URL: redis://plane-redis:6379/
  # S3/MinIO
  AWS_REGION: ""
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: uploads
  # Proxy
  APP_DOMAIN: ${APP_DOMAIN}
  FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT}
  # Google OAuth
  IS_GOOGLE_ENABLED: ${IS_GOOGLE_ENABLED:-0}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  ENABLE_GOOGLE_SYNC: ${ENABLE_GOOGLE_SYNC:-0}

services:
  # ============================================
  # FRONTEND SERVICES
  # ============================================
  web:
    image: artifacts.plane.so/makeplane/plane-frontend:${APP_RELEASE}
    container_name: plane-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${APP_DOMAIN}/api
      NEXT_PUBLIC_WEB_BASE_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_ADMIN_BASE_URL: https://${APP_DOMAIN}/god-mode
      NEXT_PUBLIC_SPACE_BASE_URL: https://${APP_DOMAIN}/spaces
      NEXT_PUBLIC_LIVE_BASE_URL: https://${APP_DOMAIN}/live
    depends_on:
      - api
    networks:
      - traefik
      - plane-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Main router - catch all for frontend
      - "traefik.http.routers.plane-web.rule=Host(`${APP_DOMAIN}`) && !PathPrefix(`/api`) && !PathPrefix(`/auth`) && !PathPrefix(`/god-mode`) && !PathPrefix(`/spaces`) && !PathPrefix(`/live`)"
      - "traefik.http.routers.plane-web.entrypoints=websecure"
      - "traefik.http.routers.plane-web.tls=true"
      - "traefik.http.routers.plane-web.tls.certresolver=cloudflare"
      - "traefik.http.services.plane-web.loadbalancer.server.port=3000"

  space:
    image: artifacts.plane.so/makeplane/plane-space:${APP_RELEASE}
    container_name: plane-space
    restart: unless-stopped
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/spaces/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik
      - plane-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.plane-space.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/spaces`)"
      - "traefik.http.routers.plane-space.entrypoints=websecure"
      - "traefik.http.routers.plane-space.tls=true"
      - "traefik.http.routers.plane-space.tls.certresolver=cloudflare"
      - "traefik.http.services.plane-space.loadbalancer.server.port=3000"

  admin:
    image: artifacts.plane.so/makeplane/plane-admin:${APP_RELEASE}
    container_name: plane-admin
    restart: unless-stopped
    depends_on:
      - api
      - web
    networks:
      - traefik
      - plane-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.plane-admin.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/god-mode`)"
      - "traefik.http.routers.plane-admin.entrypoints=websecure"
      - "traefik.http.routers.plane-admin.tls=true"
      - "traefik.http.routers.plane-admin.tls.certresolver=cloudflare"
      - "traefik.http.routers.plane-admin.middlewares=plane-admin-slash"
      - "traefik.http.middlewares.plane-admin-slash.redirectregex.regex=^https://([^/]+)/god-mode$"
      - "traefik.http.middlewares.plane-admin-slash.redirectregex.replacement=https://$${1}/god-mode/"
      - "traefik.http.middlewares.plane-admin-slash.redirectregex.permanent=true"
      - "traefik.http.services.plane-admin.loadbalancer.server.port=3000"

  live:
    image: artifacts.plane.so/makeplane/plane-live:${APP_RELEASE}
    container_name: plane-live
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}
      REDIS_HOST: plane-redis
      REDIS_PORT: 6379
      REDIS_URL: redis://plane-redis:6379/
    depends_on:
      - api
      - plane-redis
    networks:
      - traefik
      - plane-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.plane-live.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/live`)"
      - "traefik.http.routers.plane-live.entrypoints=websecure"
      - "traefik.http.routers.plane-live.tls=true"
      - "traefik.http.routers.plane-live.tls.certresolver=cloudflare"
      - "traefik.http.services.plane-live.loadbalancer.server.port=3000"

  # ============================================
  # BACKEND SERVICES
  # ============================================
  api:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE}
    container_name: plane-api
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    volumes:
      - logs_api:/code/plane/logs
    environment:
      <<: *app-env
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq
    networks:
      - traefik
      - plane-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.plane-api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.plane-api.entrypoints=websecure"
      - "traefik.http.routers.plane-api.tls=true"
      - "traefik.http.routers.plane-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.plane-auth.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.plane-auth.entrypoints=websecure"
      - "traefik.http.routers.plane-auth.tls=true"
      - "traefik.http.routers.plane-auth.tls.certresolver=cloudflare"
      - "traefik.http.routers.plane-auth.service=plane-api"
      - "traefik.http.services.plane-api.loadbalancer.server.port=8000"

  worker:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE}
    container_name: plane-worker
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    volumes:
      - logs_worker:/code/plane/logs
    environment:
      <<: *app-env
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    networks:
      - plane-internal

  beat-worker:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE}
    container_name: plane-beat-worker
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    volumes:
      - logs_beat:/code/plane/logs
    environment:
      <<: *app-env
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    networks:
      - plane-internal

  migrator:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE}
    container_name: plane-migrator
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    volumes:
      - logs_migrator:/code/plane/logs
    environment:
      <<: *app-env
    depends_on:
      - plane-db
      - plane-redis
    networks:
      - plane-internal

  # ============================================
  # DATA SERVICES
  # ============================================
  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    command: postgres -c 'max_connections=1000'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - plane-internal

  plane-redis:
    image: valkey/valkey:7.2-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - plane-internal

  plane-mq:
    image: rabbitmq:3.13-management-alpine
    container_name: plane-mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - plane-internal

  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    networks:
      - plane-internal

  # Create MinIO bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: plane-minio-setup
    depends_on:
      - plane-minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://plane-minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY};
      mc mb myminio/uploads --ignore-existing;
      mc anonymous set download myminio/uploads;
      exit 0;
      "
    networks:
      - plane-internal

# ============================================
# NETWORKS
# ============================================
networks:
  traefik:
    external: true
  plane-internal:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
  minio_data:
  logs_api:
  logs_worker:
  logs_beat:
  logs_migrator:

