name: Deploy Plane

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Variables públicas
  APP_DOMAIN: ${{ vars.APP_DOMAIN }}
  APP_RELEASE: ${{ vars.APP_RELEASE }}
  POSTGRES_USER: ${{ vars.POSTGRES_USER }}
  POSTGRES_DB: ${{ vars.POSTGRES_DB }}
  RABBITMQ_USER: ${{ vars.RABBITMQ_USER }}
  RABBITMQ_VHOST: ${{ vars.RABBITMQ_VHOST }}
  DEBUG: ${{ vars.DEBUG }}
  GUNICORN_WORKERS: ${{ vars.GUNICORN_WORKERS }}
  FILE_SIZE_LIMIT: ${{ vars.FILE_SIZE_LIMIT }}
  API_KEY_RATE_LIMIT: ${{ vars.API_KEY_RATE_LIMIT }}
  # Secrets
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  LIVE_SERVER_SECRET_KEY: ${{ secrets.LIVE_SERVER_SECRET_KEY }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    runs-on: [self-hosted, Linux, prod]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create traefik network
        run: docker network create traefik 2>/dev/null || true

      - name: Pull images
        run: docker compose pull

      - name: Stop existing containers
        run: docker compose down --remove-orphans 2>/dev/null || true

      - name: Deploy
        run: docker compose up -d

      - name: Wait for migrator to complete
        run: |
          echo "=== Waiting for database migrations ==="
          for i in {1..30}; do
            STATUS=$(docker inspect plane-migrator --format='{{.State.Status}}' 2>/dev/null || echo "running")
            if [ "$STATUS" = "exited" ]; then
              EXIT_CODE=$(docker inspect plane-migrator --format='{{.State.ExitCode}}')
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Migrations completed successfully!"
                break
              else
                echo "Migrations failed with exit code $EXIT_CODE"
                docker logs plane-migrator --tail=100
                exit 1
              fi
            fi
            echo "Migrations running... ($i/30)"
            sleep 10
          done
          echo "=== Migrator logs ==="
          docker logs plane-migrator --tail=50

      - name: Health check
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Checking API ==="
          for i in {1..20}; do
            # Check if gunicorn workers are running
            if docker exec plane-api pgrep -f "gunicorn" > /dev/null 2>&1; then
              echo "Gunicorn is running, testing endpoint..."
              RESPONSE=$(docker exec plane-api curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/users/me/ 2>/dev/null || echo "000")
              if [ "$RESPONSE" = "401" ] || [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "403" ]; then
                echo "API is responding (HTTP $RESPONSE) - healthy!"
                exit 0
              fi
              echo "API response: $RESPONSE (waiting...)"
            fi
            echo "Waiting for API... ($i/20)"
            sleep 5
          done
          echo "API health check timeout - showing logs"
          docker compose logs --tail=100 api
          exit 1
