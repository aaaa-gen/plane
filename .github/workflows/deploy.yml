name: Deploy Plane

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > plane.env << EOF
          # Domain & Version
          APP_DOMAIN=${{ vars.APP_DOMAIN }}
          APP_RELEASE=${{ vars.APP_RELEASE }}
          
          # Security (from secrets)
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          LIVE_SERVER_SECRET_KEY=${{ secrets.LIVE_SERVER_SECRET_KEY }}
          
          # Database
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          
          # RabbitMQ
          RABBITMQ_USER=${{ vars.RABBITMQ_USER }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_VHOST=${{ vars.RABBITMQ_VHOST }}
          
          # MinIO (from secrets)
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
          # Performance
          DEBUG=${{ vars.DEBUG }}
          GUNICORN_WORKERS=${{ vars.GUNICORN_WORKERS }}
          FILE_SIZE_LIMIT=${{ vars.FILE_SIZE_LIMIT }}
          API_KEY_RATE_LIMIT=${{ vars.API_KEY_RATE_LIMIT }}
          EOF

      - name: Create traefik network
        run: docker network create traefik 2>/dev/null || true

      - name: Pull images
        run: docker compose pull

      - name: Stop existing containers
        run: docker compose down --remove-orphans 2>/dev/null || true

      - name: Deploy
        run: docker compose up -d

      - name: Wait for services
        run: sleep 45

      - name: Health check
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Checking API ==="
          for i in {1..10}; do
            if docker exec plane-api curl -sf http://localhost:8000/api/v1/ > /dev/null 2>&1; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Waiting for API... ($i/10)"
            sleep 10
          done
          echo "API health check timeout - showing logs"
          docker compose logs --tail=50 api
          exit 1
