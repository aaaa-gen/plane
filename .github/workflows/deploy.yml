name: Deploy Plane

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/github-runner/apps/plane

jobs:
  deploy:
    runs-on: [self-hosted, Linux, prod]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment directory
        run: mkdir -p ${{ env.DEPLOY_PATH }}

      - name: Copy compose files to deployment directory
        run: |
          cp docker-compose.yml ${{ env.DEPLOY_PATH }}/
          cp plane.env.example ${{ env.DEPLOY_PATH }}/

      - name: Generate runtime env file
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          APP_RELEASE: ${{ vars.APP_RELEASE }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          RABBITMQ_USER: ${{ vars.RABBITMQ_USER }}
          RABBITMQ_VHOST: ${{ vars.RABBITMQ_VHOST }}
          DEBUG: ${{ vars.DEBUG }}
          GUNICORN_WORKERS: ${{ vars.GUNICORN_WORKERS }}
          FILE_SIZE_LIMIT: ${{ vars.FILE_SIZE_LIMIT }}
          API_KEY_RATE_LIMIT: ${{ vars.API_KEY_RATE_LIMIT }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LIVE_SERVER_SECRET_KEY: ${{ secrets.LIVE_SERVER_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cat > .env <<EOF
          APP_DOMAIN=${APP_DOMAIN}
          APP_RELEASE=${APP_RELEASE}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          RABBITMQ_USER=${RABBITMQ_USER}
          RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
          RABBITMQ_VHOST=${RABBITMQ_VHOST}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          SECRET_KEY=${SECRET_KEY}
          LIVE_SERVER_SECRET_KEY=${LIVE_SERVER_SECRET_KEY}
          DEBUG=${DEBUG}
          GUNICORN_WORKERS=${GUNICORN_WORKERS}
          FILE_SIZE_LIMIT=${FILE_SIZE_LIMIT}
          API_KEY_RATE_LIMIT=${API_KEY_RATE_LIMIT}
          EOF

      - name: Validate required deploy variables
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          required_vars=(
            APP_DOMAIN APP_RELEASE POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB
            RABBITMQ_USER RABBITMQ_PASSWORD RABBITMQ_VHOST
            AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
            SECRET_KEY LIVE_SERVER_SECRET_KEY
          )

          for var in "${required_vars[@]}"; do
            if ! grep -q "^${var}=" .env; then
              echo "Missing required variable in .env: ${var}" >&2
              exit 1
            fi

            value="$(grep "^${var}=" .env | head -n1 | cut -d'=' -f2-)"
            if [ -z "${value}" ]; then
              echo "Required variable is empty: ${var}" >&2
              exit 1
            fi
          done

      - name: Ensure shared Traefik network exists
        run: |
          if ! docker network inspect traefik >/dev/null 2>&1; then
            docker network create traefik
          fi

      - name: Validate gateway Traefik is running
        run: |
          if ! docker ps --filter "name=^traefik$" --format "{{.Names}}" | grep -x traefik >/dev/null 2>&1; then
            echo "Shared Traefik gateway is not running on prod." >&2
            echo "Deploy the gateway repository first, then re-run this workflow." >&2
            exit 1
          fi

      - name: Pull images
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose --env-file .env pull

      - name: Stop existing containers
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose --env-file .env down --remove-orphans 2>/dev/null || true

      - name: Debug env vars
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "APP_DOMAIN=$(grep '^APP_DOMAIN=' .env | cut -d'=' -f2-)"
          echo "APP_RELEASE=$(grep '^APP_RELEASE=' .env | cut -d'=' -f2-)"
          echo "POSTGRES_USER=$(grep '^POSTGRES_USER=' .env | cut -d'=' -f2-)"
          echo "---"
          echo "Runtime .env loaded"

      - name: Deploy
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose --env-file .env up -d

      - name: Wait for migrator to complete
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "=== Waiting for database migrations ==="
          for i in {1..30}; do
            STATUS=$(docker inspect plane-migrator --format='{{.State.Status}}' 2>/dev/null || echo "running")
            if [ "$STATUS" = "exited" ]; then
              EXIT_CODE=$(docker inspect plane-migrator --format='{{.State.ExitCode}}')
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Migrations completed successfully!"
                break
              else
                echo "Migrations failed with exit code $EXIT_CODE"
                docker logs plane-migrator --tail=100
                exit 1
              fi
            fi
            echo "Migrations running... ($i/30)"
            sleep 10
          done
          echo "=== Migrator logs ==="
          docker logs plane-migrator --tail=50

      - name: Health check
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "=== Container Status ==="
          docker compose --env-file .env ps
          echo ""
          echo "=== Checking API ==="
          for i in {1..10}; do
            # Check container is running and has uvicorn workers using docker top (from host)
            if docker top plane-api 2>/dev/null | grep -q "uvicorn"; then
              echo "API healthy! Uvicorn workers running"
              docker compose --env-file .env logs --tail=10 api
              exit 0
            fi
            echo "Waiting for API workers... ($i/10)"
            sleep 5
          done
          echo "API health check timeout - showing logs"
          docker compose --env-file .env logs --tail=100 api
          exit 1

      # NOTE: Keep .env file for container runtime - DO NOT DELETE
      # The containers need the .env file to load environment variables during docker compose up
      # - name: Cleanup runtime env file
      #   if: always()
      #   working-directory: ${{ env.DEPLOY_PATH }}
      #   run: rm -f .env
