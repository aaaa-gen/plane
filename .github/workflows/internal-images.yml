name: Internal Images (GHCR)

on:
  push:
    branches:
      - internal-preview
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: internal-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.image }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plane-frontend
            context: .
            dockerfile: ./apps/web/Dockerfile.web
          - image: plane-admin
            context: .
            dockerfile: ./apps/admin/Dockerfile.admin
          - image: plane-space
            context: .
            dockerfile: ./apps/space/Dockerfile.space
          - image: plane-live
            context: .
            dockerfile: ./apps/live/Dockerfile.live
          - image: plane-backend
            context: ./apps/api
            dockerfile: ./Dockerfile.api
          - image: plane-proxy
            context: ./apps/proxy
            dockerfile: ./Dockerfile.ce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.vars.outputs.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
